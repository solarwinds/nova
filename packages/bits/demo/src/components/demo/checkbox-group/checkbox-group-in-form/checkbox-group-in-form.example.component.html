<form [formGroup]="myForm" (submit)="onSubmit()">
    <div class="form-group">
        @if ( !myForm.controls['checkboxGroup'].valid &&
        myForm.controls['checkboxGroup'].touched ) {
        <nui-message [allowDismiss]="true" type="critical">
            <b i18n>Select minimum 3 checkboxes!</b>
        </nui-message>
        }
        <nui-checkbox-group
            id="nui-demo-checkbox-group-in-form"
            formControlName="checkboxGroup"
            name="vegetable"
            required
        >
            @for (vegetable of vegetables; track vegetable) {
            <nui-checkbox [value]="vegetable">
                {{ vegetable }}
            </nui-checkbox>
            }
        </nui-checkbox-group>
    </div>
    <button
        nui-button
        type="submit"
        [disabled]="myForm.disabled || myForm.controls['checkboxGroup'].invalid"
        i18n
    >
        Submit
    </button>
</form>
