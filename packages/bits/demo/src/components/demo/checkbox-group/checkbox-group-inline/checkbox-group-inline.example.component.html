<nui-checkbox-group
    id="nui-demo-checkbox-group-inline"
    class="nui-checkbox-group-inline"
    [values]="selectedVegetables"
    name="vegetable"
>
    @for (vegetable of vegetables; track vegetable) {
    <nui-checkbox [value]="vegetable">
        {{ vegetable }}
    </nui-checkbox>
    }
</nui-checkbox-group>
