<div>
    <nui-tab-heading-group (selected)="updateContent($event)">
        @for (tab of tabsetContent; track tab) {
        <nui-tab-heading [disabled]="tab.isDisabled" [tabId]="tab.id">
            <div class="d-flex align-content-center">
                <div class="d-inline-flex align-items-center">
                    @if (icon) {
                    <nui-icon
                        class="pr-2"
                        [icon]="tab.icon.name"
                        [iconColor]="
                            tab.isDisabled
                                ? tab.icon.disabledColor
                                : currentTabId === tab.id
                                ? tab.icon.activeColor
                                : tab.icon.inactiveColor
                        "
                    ></nui-icon>
                    }
                    <div class="ellipsis">
                        <span [title]="tab.title">{{ tab.title }}</span>
                    </div>
                </div>
            </div>
        </nui-tab-heading>
        }
    </nui-tab-heading-group>

    @for (tab of tabsetContent; track tab) {
    <div>
        @if (currentTabId === tab.id) {
        <nui-content size="small">
            <p>
                Tab titeled <strong>{{ tab.title }}</strong> with id
                <strong>{{ tab.id }}</strong
                >. It's content goes below:
            </p>
            <p>{{ tab.content }}</p>
        </nui-content>
        }
    </div>
    }
</div>
