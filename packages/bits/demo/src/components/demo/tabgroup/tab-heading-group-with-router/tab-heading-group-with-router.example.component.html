<div>
    <nui-tab-heading-group>
        @for (tab of tabsetContent; track tab) {
        <nui-tab-heading
            [tabId]="tab.id"
            routerLink="/tabgroup/{{ tab.id }}"
            [active]="currentTabRoute === tab.id"
        >
            <div class="d-flex align-content-center">
                <div class="d-inline-flex align-items-center">
                    @if (icon && tab !== tabsetContent[2]) {
                    <nui-icon
                        [icon]="tab.icon.name"
                        [iconColor]="
                            currentTabRoute === tab.id
                                ? tab.icon.activeColor
                                : tab.icon.inactiveColor
                        "
                    ></nui-icon>
                    } @if (tab !== tabsetContent[0]) {
                    <span class="pl-2" [title]="tab.title">{{
                        tab.title
                    }}</span>
                    }
                </div>
            </div>
        </nui-tab-heading>
        }
    </nui-tab-heading-group>

    <!-- Tab content is placed below depending on the component used in a certain routing -->
    <router-outlet></router-outlet>
</div>
