<nui-combobox-v2
    placeholder="Select Item"
    i18n-placeholder
    [formControl]="comboboxControl"
    #combobox
>
    @for (option of options; track option) {
    <nui-select-v2-option [value]="option">
        <div class="d-flex align-items-center">
            <span [nuiComboboxV2OptionHighlight]="option"></span>
        </div>
    </nui-select-v2-option>
    } @if (combobox.canCreateOption | async) {
    <nui-overlay-item
        class="nui-combobox-v2__create-option"
        (click)="createOption(combobox.inputValue)"
    >
        Create option "{{ combobox.inputValue }}"
    </nui-overlay-item>
    } @if (combobox.searchEmpty | async) {
    <div class="nui-combobox-v2__empty-search" i18n>
        No other existing item available
    </div>
    }
</nui-combobox-v2>
