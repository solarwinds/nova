<nui-popup contextClass="nui-demo-custom-class">
    <button
        nui-button
        nuiPopupToggle
        width="90px"
        type="button"
        [icon]="icon"
        [iconRight]="true"
        class="menu-button"
        [isEmpty]="false"
        i18n
    >
        Click
    </button>
    <div popupAreaContent>
        @for (item of itemsSource; track item) {
        <nui-menu-item tabindex="0">{{ item }}</nui-menu-item>
        }
    </div>
</nui-popup>
