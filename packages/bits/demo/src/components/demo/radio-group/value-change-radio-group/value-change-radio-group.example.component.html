<h1 i18n>Selected color: {{ selectedColor }}</h1>
<nui-radio-group
    name="color"
    [(value)]="selectedColor"
    (valueChange)="showSelected()"
>
    @for (color of colors; track color) {
    <nui-radio [value]="color" [hint]="colorHints[color]">
        {{ color }}
    </nui-radio>
    }
</nui-radio-group>
