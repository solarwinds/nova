<div class="container">
    <nui-radio-group
        id="basic-radio-group"
        name="fruit"
        [(value)]="selectedFruit"
    >
        @for (fruit of fruits; track fruit) {
        <nui-radio
            [value]="fruit"
            [checked]="fruit === 'Orange'"
            [disabled]="fruit === 'Banana'"
        >
            {{ fruit }}
        </nui-radio>
        }
    </nui-radio-group>

    <form [formGroup]="disabledForm">
        <nui-form-field
            caption="Radio Group"
            [control]="disabledForm.controls['radioGroup']"
        >
            <nui-radio-group
                id="disabled-radio-group"
                formControlName="radioGroup"
                name="vegetable"
            >
                @for (vegetable of vegetables; track vegetable) {
                <nui-radio [value]="vegetable">
                    {{ vegetable }}
                </nui-radio>
                }
            </nui-radio-group>
        </nui-form-field>
    </form>
    <nui-checkbox
        id="toggle-disabled-group-checkbox"
        [checked]="isDisabledGroup"
        (valueChange)="toggleDisabled()"
    >
        Disabled
    </nui-checkbox>
</div>
