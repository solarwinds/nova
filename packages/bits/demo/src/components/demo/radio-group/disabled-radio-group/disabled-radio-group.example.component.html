<h1 i18n>Selected fruit: {{ selectedFruit }}</h1>
<nui-radio-group id="fruit-radio-group" name="fruit" [(value)]="selectedFruit">
    @for (fruit of fruits; track fruit) {
    <nui-radio
        [value]="fruit"
        [checked]="fruit === 'Orange'"
        [disabled]="fruit === 'Banana'"
    >
        {{ fruit }}
    </nui-radio>
    }
</nui-radio-group>
