<nui-menu
    id="nui-demo-append-to-body-menu"
    title="Basic appended to body menu"
    [appendToBody]="true"
    i18n-title
>
    @for (group of dataset.itemsInGroups; track group) {
    <nui-menu-group [header]="group.header">
        @for (item of group.items; track item) {
        <nui-menu-action (actionDone)="actionDone(item)">
            {{ item }}
        </nui-menu-action>
        }
    </nui-menu-group>
    }
</nui-menu>
