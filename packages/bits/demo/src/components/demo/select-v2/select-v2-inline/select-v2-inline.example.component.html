<nui-select-v2
    class="d-inline-flex"
    placeholder="Select Item"
    i18n-placeholder
    style="margin-right: 15px"
>
    @for (item of items; track item) {
    <nui-select-v2-option [value]="item">{{ item }} </nui-select-v2-option>
    }
</nui-select-v2>
