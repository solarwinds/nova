<nui-select-v2 placeholder="Select Item" i18n-placeholder>
    @for (itemGroup of items; track itemGroup; let last = $last) {
    <nui-select-v2-option-group>
        <span class="nui-select-v2-option-group--header">{{
            itemGroup.header
        }}</span>
        @for (item of itemGroup.items; track item) {
        <nui-select-v2-option [value]="item">
            {{ item.name }}
        </nui-select-v2-option>
        } @if (!last) {
        <nui-divider size="extra-small"></nui-divider>
        }
    </nui-select-v2-option-group>
    }
</nui-select-v2>
