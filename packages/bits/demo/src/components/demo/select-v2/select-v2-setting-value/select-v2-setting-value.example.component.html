<b>Setting value using <code>value</code> input</b>
<nui-select-v2 [value]="items[0]" placeholder="Select Item" i18n-placeholder>
    @for (item of items; track item) {
    <nui-select-v2-option [value]="item">{{ item }}</nui-select-v2-option>
    }
</nui-select-v2>

<br />

<b>Setting value using <code>FormControl</code></b>
<nui-select-v2
    placeholder="Select Item"
    i18n-placeholder
    [formControl]="selectControl"
>
    @for (item of items; track item) {
    <nui-select-v2-option [value]="item">{{ item }}</nui-select-v2-option>
    }
</nui-select-v2>
