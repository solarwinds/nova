<div [style.height.px]="400" [style.max-width.px]="1300">
    <cdk-virtual-scroll-viewport
        tableStickyHeader
        class="h-100"
        [itemSize]="itemSize"
        [maxBufferPx]="1200"
        [minBufferPx]="400"
    >
        <table
            nui-table
            [dataSource]="items"
            [trackBy]="trackByNo"
            [sortable]="true"
            [selectionConfig]="selectionConfig"
            [(selection)]="selection"
        >
            @for (column of displayedColumns; track column) {
            <ng-container [nuiColumnDef]="column">
                <th nui-header-cell *nuiHeaderCellDef>{{ column }}</th>
                <td nui-cell *nuiCellDef="let element">
                    {{ element[column] }}
                </td>
            </ng-container>
            }

            <tr nui-header-row *nuiHeaderRowDef="displayedColumns"></tr>
            <tr
                nui-row
                *nuiRowDef="let row; columns: displayedColumns"
                [rowObject]="row"
            ></tr>
        </table>
    </cdk-virtual-scroll-viewport>
</div>
<br />
{{ selection | json }}
