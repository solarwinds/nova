<div class="row mb-2">
    <div class="col-3">
        <nui-switch
            [value]="makeSticky"
            (valueChange)="updateStickyState($event)"
            i18n
        >
            {{ makeSticky ? "Sticky" : "Not Sticky" }}
        </nui-switch>
    </div>
</div>

<div
    id="nui-demo-table-sticky-header"
    [style.height.px]="gridHeight"
    [style.max-width.px]="1300"
>
    <cdk-virtual-scroll-viewport
        tableStickyHeader
        class="h-100"
        [itemSize]="itemSize"
        [maxBufferPx]="1200"
        [minBufferPx]="400"
    >
        <table
            nui-table
            [dataSource]="items$ | async"
            [trackBy]="trackByNo"
            [sortable]="true"
        >
            <!-- ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^ -->
            @for (column of displayedColumns; track column) {
            <ng-container
                [nuiColumnDef]="column"
                [type]="column === 'icon' ? 'icon' : 'default'"
            >
                <th nui-header-cell *nuiHeaderCellDef>
                    @if (column !== 'icon') {
                    <span>{{ column }}</span>
                    } @else {
                    <div
                        class="d-flex align-items-center justify-content-center"
                    >
                        <nui-icon icon="enable"></nui-icon>
                    </div>
                    }
                </th>
                <td nui-cell *nuiCellDef="let element">
                    @if (column !== 'icon') {
                    <span>{{ element[column] }}</span>
                    } @else {
                    <div
                        class="d-flex align-items-center justify-content-center"
                    >
                        <nui-icon [icon]="element[column]"></nui-icon>
                    </div>
                    }
                </td>
            </ng-container>
            }

            <tr nui-header-row *nuiHeaderRowDef="displayedColumns"></tr>
            <tr nui-row *nuiRowDef="let row; columns: displayedColumns" [rowObject]="row"></tr>
        </table>
    </cdk-virtual-scroll-viewport>
</div>
