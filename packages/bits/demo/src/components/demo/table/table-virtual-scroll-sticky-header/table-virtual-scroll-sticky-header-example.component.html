<div class="row mb-2">
    <div class="col-3">
        <nui-switch
            [value]="makeSticky"
            (valueChange)="updateStickyState($event)"
            i18n
        >
            {{ makeSticky ? "Sticky" : "Not Sticky" }}
        </nui-switch>
    </div>
</div>

<div
    id="nui-demo-table-sticky-header"
    [style.height.px]="gridHeight"
    [style.max-width.px]="1300"
>
    <cdk-virtual-scroll-viewport
        tableStickyHeader
        class="h-100"
        [itemSize]="itemSize"
        [maxBufferPx]="1200"
        [minBufferPx]="400"
    >
        <table
            nui-table
            [dataSource]="items$"
            [trackBy]="trackByNo"
            [sortable]="true"
        >
            @for (column of displayedColumns; track column) {
            <ng-container [nuiColumnDef]="column">
                <th nui-header-cell *nuiHeaderCellDef>{{ column }}</th>
                <td nui-cell *nuiCellDef="let element">
                    {{ element[column] }}
                </td>
            </ng-container>
            }

            <tr nui-header-row *nuiHeaderRowDef="displayedColumns"></tr>
            <tr
                nui-row
                *nuiRowDef="let row; columns: displayedColumns"
                [rowObject]="row"
            ></tr>
        </table>
    </cdk-virtual-scroll-viewport>
</div>
