<div class="arrow-example">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div class="dnd-button" cdkDrag #draggable="cdkDrag">
            <button
                nui-button
                class="toggle-button"
                #toggleButton
                type="button"
                [isEmpty]="false"
                (click)="overlay.toggle()"
                i18n
            >
                Draggable toggle
            </button>
        </div>

        <button
            nui-button
            class="h-50"
            type="button"
            [isEmpty]="false"
            (click)="draggable.reset()"
            i18n
        >
            Reset draggable button
        </button>
    </div>

    <nui-overlay
        #overlay
        [toggleReference]="toggleButton['el'].nativeElement"
        [overlayConfig]="overlayConfig"
    >
        <img
            src="https://cdn.stocksnap.io/img-thumbs/960w/thumbs%20up-hand_QUWPLI693K.jpg"
            alt="Thumbs up"
            class="w-100"
        />
        @if (arrowSelectControl.value) {
        <nui-overlay-arrow></nui-overlay-arrow>
        }
    </nui-overlay>

    Position:
    <nui-select-v2
        placeholder="Select Position"
        i18n-placeholder
        [formControl]="positionSelectControl"
        class="select"
    >
        @for (position of possiblePositions; track position) {
        <nui-select-v2-option [value]="position">{{
            position
        }}</nui-select-v2-option>
        }
    </nui-select-v2>

    Arrow:
    <nui-select-v2
        placeholder="Select Arrow"
        i18n-placeholder
        [formControl]="arrowSelectControl"
        class="select"
    >
        @for (arrow of [true, false]; track arrow) {
        <nui-select-v2-option [value]="arrow">{{ arrow }}</nui-select-v2-option>
        }
    </nui-select-v2>
</div>
