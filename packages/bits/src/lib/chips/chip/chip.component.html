<div class="nui-chip__value" [ngClass]="customClass">
    <span
        class="nui-chip__value-name"
        [title]="!isContentProjected ? item?.label : ''"
        [ngClass]="{ projected: isContentProjected }"
    >
        @if (isContentProjected) {
        <ng-container *ngTemplateOutlet="projection"></ng-container>
        } @else {
        {{ item?.label }}
        }
    </span>
    // a11y: WCAG 2.5.8 Target Size - TODO: NUI-6279
    <span
        role="button"
        tabindex="0"
        class="nui-chip__value-remove"
        [attr.aria-label]="'Remove ' + item?.label"
        [nuiTooltip]="closeButtonTooltip"
        (click)="onRemove()"
        (keydown.enter)="onRemove()"
        (keydown.space)="$event.preventDefault(); onRemove()"
    >
        <nui-icon
            icon="remove"
            iconSize="small"
            [decorative]="true"
        ></nui-icon>
    </span>
</div>

<ng-template #projection><ng-content></ng-content></ng-template>
<ng-template #itemLabel>{{ item?.label }}</ng-template>
