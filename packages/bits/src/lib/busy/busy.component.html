<div class="nui-nova-busy">
    <div
        class="nui-nova-busy__overlay--align"
        [class.nui-nova-busy__overlay--hidden]="!busy"
        [class.nui-nova-busy__overlay]="busy"
    >
        <div class="nui-nova-busy__container">
            @if (isProgressTemplate) {
            <ng-content select="nui-progress"></ng-content>
            } @if (isSpinnerTemplate) {
            <ng-content select="nui-spinner"></ng-content>
            } @if (isDefaultTemplate) {
            <nui-spinner [show]="busy"></nui-spinner>
            }
        </div>
    </div>
    <ng-content></ng-content>
</div>
