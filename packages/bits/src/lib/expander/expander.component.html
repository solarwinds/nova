<div class="nui-expander" [class.nui-expander--expanded]="state === 'expanded'">
    <div
        class="nui-expander__header"
        tabindex="0"
        role="button"
        [attr.aria-label]="expanderToggleAriaLabel"
        [attr.aria-expanded]="state === 'expanded'"
        [attr.aria-disabled]="disabled"
        [attr.aria-controls]="bodyId"
        [class.nui-expander__header--empty]="
            !header && isCustomHeaderContentEmpty
        "
        (keydown)="onKeyDown($event)"
        (click)="toggle()"
    >
        <nui-icon
            class="nui-expander__header-icon"
            [iconColor]="getIconColor()"
            aria-hidden="true"
            icon="{{ open ? 'triangle-down' : 'triangle-right' }}"
        ></nui-icon>
        <div
            class="nui-expander__header-content-wrapper"
            [class.nui-expander__custom-header--empty]="
                isCustomHeaderContentEmpty
            "
        >
            <div
                #customHeaderContent
                class="nui-expander__custom-header"
                [class.nui-expander__custom-header--empty]="
                    isCustomHeaderContentEmpty
                "
            >
                <ng-content select="[nuiExpanderHeader]"></ng-content>
            </div>
            @if (isCustomHeaderContentEmpty) {
            <div
                class="nui-expander__header-content"
                [class.nui-expander__header-content--with-icon]="!!icon"
            >
                @if (!!icon) {
                <nui-icon
                    class="nui-expander__header-content-icon"
                    [icon]="icon"
                ></nui-icon>
                }
                <span class="nui-expander__header-title">{{ header }}</span>
            </div>
            }
        </div>
    </div>
    <div
        class="nui-expander__body-wrapper"
        role="region"
        [id]="bodyId"
        [attr.aria-label]="expanderBodyAriaLabel"
    >
        @if (open) {
        <div
            class="nui-expander__body"
            [class.hide-left-border]="hideLeftBorder"
            @expandContent
        >
            <ng-content></ng-content>
        </div>
        }
    </div>
</div>
