<div
    class="nui-toast__content d-flex flex-nowrap flex-row justify-content-between align-items-start"
    [class.nui-toast__content--without-close-button]="!closeButton"
>
    <nui-icon
        class="nui-toast__status-icon"
        iconSize="large"
        icon="{{ toastIcon }}"
        aria-hidden="true"
    ></nui-icon>
    <div class="nui-toast__content-message flex-grow-1">
        @if (title) {
        <span class="nui-toast__content-title" [attr.aria-label]="title">{{
            title
        }}</span>
        } @if (body && options.enableHtml) {
        <span class="nui-toast__content-body" [innerHTML]="body"></span>
        } @if (body && !options.enableHtml) {
        <span class="nui-toast__content-body" [attr.aria-label]="body">{{
            body
        }}</span>
        }
    </div>
    @if (options.closeButton) {
    <button
        nui-button
        type="button"
        class="nui-toast__dismiss-button"
        displayStyle="action"
        size="default"
        icon="close"
        ariaLabel="Dismiss notification"
        i18n-ariaLabel
        (click)="remove()"
    ></button>
    }
</div>
@if (options.progressBar) {
<div class="nui-toast__progress" [style.width.%]="width"></div>
}
