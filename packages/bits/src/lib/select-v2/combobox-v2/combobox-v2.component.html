<div
    class="w-100 d-flex flex-wrap align-items-center pt-2"
    [attr.role]="multiselect && selectedOptions.length ? 'list' : null"
>
    <ng-content select="[selectedItems]"></ng-content>

    <input
        class="nui-combobox-v2__input pb-2"
        type="text"
        role="combobox"
        aria-autocomplete="list"
        aria-haspopup="listbox"
        [attr.aria-controls]="isDropdownOpen ? 'nui-overlay' : null"
        [attr.aria-expanded]="isDropdownOpen || false"
        [id]="triggerId"
        [attr.aria-label]="accessibleLabel"
        [class.has-error]="isInErrorState"
        [disabled]="isDisabled"
        [(ngModel)]="inputValue"
        [placeholder]="placeholder"
        (input)="handleInput(input.value)"
        (keydown)="onKeyDown($event)"
        (click)="selectTextInInput()"
        #input
    />
</div>
@if (isRemoveValueEnabled && (selectedOptions[0] || inputValue)) {
<button
    tabindex="0"
    nui-button
    class="nui-combobox-v2__remove-value action"
    (click)="clearValue($event)"
    [isEmpty]="true"
    icon="remove"
    type="button"
    ariaLabel="Clear value"
    i18n-ariaLabel="@@clearValue"
    title="Clear value"
    [nuiTooltip]="clearValueButtonTooltip"
    [class.disabled]="isDisabled"
    [disabled]="isDisabled"
></button>
}
<button
    tabindex="-1"
    class="nui-combobox-v2__toggle action"
    nui-button
    type="button"
    [isEmpty]="true"
    icon="caret-down"
    ariaLabel="Toggle dropdown"
    i18n-ariaLabel="@@toggleDropdown"
    title="Toggle dropdown"
    [class.rotate]="isDropdownOpen"
    [class.disabled]="isDisabled"
    [disabled]="isDisabled"
    (click)="selectTextInInput()"
></button>
<nui-overlay
    roleAttr="listbox"
    [ariaLabelledby]="triggerId"
    [toggleReference]="elRef.nativeElement"
    [viewportMargin]="popupViewportMargin"
    [overlayConfig]="overlayConfig"
>
    <ng-content></ng-content>
</nui-overlay>
