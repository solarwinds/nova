<div
    #input
    [id]="triggerId"
    class="nui-select-v2__container"
    [attr.role]="displayValueTemplate ? 'none' : 'combobox'"
    [attr.tabindex]="displayValueTemplate ? -1 : isDisabled ? -1 : 0"
    [attr.aria-haspopup]="displayValueTemplate ? null : 'listbox'"
    [attr.aria-expanded]="displayValueTemplate ? null : isDropdownOpen || false"
    [attr.aria-controls]="
        displayValueTemplate ? null : isDropdownOpen ? 'nui-overlay' : null
    "
    [attr.aria-label]="displayValueTemplate ? null : accessibleLabel"
    (keydown)="onKeyDown($event)"
>
    @if (!displayValueTemplate) {
    <div class="nui-select-v2__value">
        @if (!isEmpty) {
        <div class="nui-select-v2__value-content">
            <span>{{ displayText || "\u00A0" }}</span>
        </div>
        } @if (isEmpty) {
        <span class="nui-select-v2__placeholder">{{
            placeholder || "\u00A0"
        }}</span>
        }
        <nui-icon
            [style.transform]="isDropdownOpen ? 'rotate(180deg)' : ''"
            [icon]="caretIcon"
            aria-hidden="true"
        ></nui-icon>
    </div>
    } @if (displayValueTemplate) {
    <ng-container
        [ngTemplateOutlet]="displayValueTemplate"
        [ngTemplateOutletContext]="{
            $implicit: getLastSelectedOption()?.displayValueContext || value,
            open: isDropdownOpen
        }"
    ></ng-container>
    }
</div>
<nui-overlay
    roleAttr="listbox"
    [ariaLabelledby]="triggerId"
    [toggleReference]="elRef.nativeElement"
    [viewportMargin]="popupViewportMargin"
    [overlayConfig]="overlayConfig"
>
    <ng-content></ng-content>
</nui-overlay>
