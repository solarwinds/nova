<div
    tabindex="0"
    #input
    [id]="triggerId"
    class="nui-select-v2__container"
    [attr.aria-label]="ariaLabel"
    (keydown)="onKeyDown($event)"
>
    @if (!displayValueTemplate) {
    <div class="nui-select-v2__value">
        @if (!isEmpty) {
        <div class="nui-select-v2__value-content">
            <span>{{ displayText || "\u00A0" }}</span>
        </div>
        } @if (isEmpty) {
        <span class="nui-select-v2__placeholder">{{
            placeholder || "\u00A0"
        }}</span>
        }
        <nui-icon
            [style.transform]="isDropdownOpen ? 'rotate(180deg)' : ''"
            [icon]="caretIcon"
        ></nui-icon>
    </div>
    } @if (displayValueTemplate) {
    <ng-container
        [ngTemplateOutlet]="displayValueTemplate"
        [ngTemplateOutletContext]="{
            $implicit: getLastSelectedOption()?.displayValueContext || value,
            open: isDropdownOpen
        }"
    ></ng-container>
    }
</div>
<nui-overlay
    roleAttr="listbox"
    [ariaLabelledBy]="triggerId"
    [toggleReference]="elRef.nativeElement"
    [viewportMargin]="popupViewportMargin"
    [overlayConfig]="overlayConfig"
>
    <ng-content></ng-content>
</nui-overlay>
