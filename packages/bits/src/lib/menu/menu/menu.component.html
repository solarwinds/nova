<nui-popup
    [class.nui-menu--compact]="isMenuCompact()"
    (opened)="onMenuOpen()"
    [appendToBody]="appendToBody"
    [width]="widthOfPopup"
    [contextClass]="contextClass + ' nui-menu-popup-host'">
    <button
        #menuToggle
        nui-button
        nuiPopupToggle
        [toggleOnKey]="false"
        [disabled]="isDisabled"
        aria-haspopup="true"
        [attr.aria-expanded]="(popup?.isOpen ?? false).toString()"
        [attr.aria-controls]="popup?.isOpen ? popupContentId : null"
        type="button"
        (blur)="onBlur($event)"
        [displayStyle]="displayStyle"
        [size]="size"
        [icon]="icon"
        [iconRight]="isTitlePresent()"
        class="menu-button no-shadow"
        [isEmpty]="!isTitlePresent()"
        [ariaLabel]="title || ariaLabel || 'Menu'">
        <span>{{ title }}</span>
    </button>
    <div popupAreaContent [id]="popupContentId">
        <nui-menu-popup
            *ngIf="itemsSource"
            [itemsSource]="itemsSource"
            [size]="size"></nui-menu-popup>
        <ng-container *ngIf="!itemsSource">
            <ng-content></ng-content>
        </ng-container>
    </div>
</nui-popup>
