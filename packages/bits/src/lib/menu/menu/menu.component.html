<nui-popup
    [class.nui-menu--compact]="isMenuCompact()"
    (opened)="onMenuOpen()"
    [appendToBody]="appendToBody"
    [width]="widthOfPopup"
    [contextClass]="contextClass + ' nui-menu-popup-host'"
>
    <button
        #menuToggle
        nui-button
        nuiPopupToggle
        [role]="'menu'"
        [toggleOnKey]="false"
        [disabled]="isDisabled"
        [opened]="popup?.isOpen || false"
        [attr.aria-expanded]="!!popup?.isOpen"
        [attr.aria-controls]="popup?.isOpen ? popupContentId : null"
        [attr.aria-activedescendant]="popup?.isOpen ? activeDescendant : null"
        type="button"
        (blur)="onBlur($event)"
        [displayStyle]="displayStyle"
        [size]="size"
        [icon]="icon"
        [iconRight]="isTitlePresent()"
        class="menu-button no-shadow"
        [isEmpty]="!isTitlePresent()"
        [ariaLabel]="menuAriaLabel"
    >
        <span>{{ title }}</span>
    </button>
    <div popupAreaContent [id]="popupContentId" role="menu">
        @if (itemsSource) {
        <nui-menu-popup
            [itemsSource]="itemsSource"
            [size]="size"
        ></nui-menu-popup>
        } @else {
            <ng-content></ng-content>
        }
    </div>
</nui-popup>
