<div class="nui-timepicker">
    <div class="nui-timepicker__container" (click)="scrollToView()" #toggleRef>
        <nui-textbox
            [disabled]="isDisabled"
            autocomplete="off"
            [class.nui-timepicker__input-disabled]="isDisabled"
            #date
            [isInErrorState]="isInErrorState"
            (textChange)="onInputActiveDateChanged($event)"
            (blurred)="updateInnerModel($event)"
            [ariaLabel]="ariaLabel"
        >
        </nui-textbox>
        <!-- a11y: manual review required — WCAG 2.5.8 Target Size: clock icon is 16×16px (below 24×24px minimum). Requires design change to increase the clickable area. -->
        <nui-icon
            #menuTrigger
            class="nui-timepicker__icon"
            icon="clock"
            tabindex="0"
            role="button"
            aria-label="Open time picker"
            i18n-aria-label="@@timePicker.icon.ariaLabel|Time picker calendar icon ARIA label"
            (click)="focusOnForm()"
            (keydown.enter)="focusOnForm()"
            (keydown.space)="$event.preventDefault(); focusOnForm()"
            [iconColor]="getIconColor()"
        >
        </nui-icon>
    </div>

    <div #popupArea></div>

    <nui-overlay
        #overlay
        [toggleReference]="toggleRef"
        [overlayConfig]="overlayConfig"
        [customContainer]="customContainer"
    >
        <nui-menu-popup
            #popup
            [itemsSource]="itemsSource"
            (menuItemClicked)="select($event)"
        >
        </nui-menu-popup>
    </nui-overlay>
</div>
