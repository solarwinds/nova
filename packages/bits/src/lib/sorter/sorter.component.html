<div>
    @if (caption) {
    <label class="nui-sorter__label">{{ caption }}</label>
    }
    <div class="btn-group nui-sorter__popup" #toggleRef>
        <button
            nui-button
            type="button"
            class="nui-sorter__toggle-button"
            [icon]="getSortIcon()"
            [ariaLabel]="getAriaLabelForSortingButton()"
            (click)="toggleSortDirection()"
        >
            <span class="nui-sorter__display-value">
                {{ getSelectedItemTitle() }}
            </span>
        </button>
        <button
            nui-button
            type="button"
            class="nui-selector__toggle"
            (click)="toggleSorterMenu()"
            ariaLabel="Open Sorter Menu"
            i18n-ariaLabel
            icon="caret-down"
            aria-haspopup="menu"
            [attr.aria-expanded]="overlay.showing"
            [attr.aria-controls]="
                overlay.showing ? 'nui-sorter-menu-' + _id : null
            "
            [attr.aria-activedescendant]="
                overlay.showing ? activeDescendant : null
            "
        ></button>
    </div>

    <div #popupArea></div>

    <nui-overlay
        #overlay
        [toggleReference]="toggleRef"
        [overlayConfig]="overlayConfig"
        [customContainer]="customContainer"
    >
        <nui-menu-popup
            #popup
            [id]="'nui-sorter-menu-' + _id"
            [itemsSource]="items"
            (menuItemClicked)="select($event)"
        ></nui-menu-popup>
    </nui-overlay>
</div>
