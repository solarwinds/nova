<div class="nui-checkbox">
    <label
        class="nui-checkbox__label"
        #checkboxLabel
        [attr.role]="role"
        [attr.aria-label]="ariaLabel || null"
        [attr.aria-labelledby]="ariaLabelledby"
        [attr.aria-checked]="role !== 'presentation' ? getAriaChecked() : null"
        [attr.aria-describedby]="ariaDescribedby"
        [attr.tabindex]="(role !== 'presentation' && !disabled) ? 0 : null"
        [title]="title"
        [class.nui-checkbox__translucent]="disabled"
        (mouseenter)="hoverHandler()"
        (mouseleave)="hoverHandler()"
    >
        <div class="nui-checkbox__content">
            <input
                #inputViewContainer
                class="nui-checkbox__input"
                type="checkbox"
                [attr.name]="name"
                [attr.tabindex]="-1"
                [attr.aria-hidden]="role === 'presentation' ? 'true' : null"
                [value]="value"
                [checked]="checked"
                [disabled]="disabled"
                [required]="required"
                [indeterminate]="indeterminate"
                (click)="onClick($event)"
                (change)="changeHandler($event)"
            />
            <div class="nui-checkbox__mark" [attr.aria-hidden]="role === 'presentation' ? 'true' : null">
                <i class="nui-checkbox__glyph"></i>
            </div>
            <div #checkboxContent class="nui-checkbox__transclude">
                <ng-content></ng-content>
            </div>
        </div>
        <div class="nui-help-hint" *ngIf="hint">{{ hint }}</div>
    </label>
</div>
