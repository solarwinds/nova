<ng-template #showOptional>
    @if (showOptionalText) {
    <span class="nui-form-field__state-text" i18n>(optional)</span>
    }
</ng-template>

<div class="nui-form-field" [ngStyle]="{ width: getWidth() }">
    @if (caption) {
    <div class="nui-form-field__control-label-container">
        <div class="nui-form-field__control-label-container-description">
            <label class="nui-form-field__control-label">{{ caption }}</label>
            @if (controlIsOptional) {
            <span class="nui-form-field__state-text" i18n>(optional)</span>
            }
        </div>
        @if (info || infoTemplate) {
        <div class="nui-form-field__control-label-container-info">
            <nui-popover
                [template]="infoTemplatePlain"
                class="d-inline-flex"
                [unlimited]="true"
            >
                <nui-icon [icon]="'severity_info'"></nui-icon>
            </nui-popover>
        </div>
        }
    </div>
    }
    <ng-content></ng-content>
    <div class="nui-form-field__help">
        <div>
            <ng-content select="nui-validation-message"> </ng-content>
        </div>
        @if (hint || hintTemplate) {
        <span class="nui-help-hint">
            @if (hint && !hintTemplate) {
            {{ hint }}
            } @if (hintTemplate && !hint) {
            <ng-container [ngTemplateOutlet]="hintTemplate"></ng-container>
            }
        </span>
        }
    </div>
</div>

<ng-template #infoTemplatePlain>
    @if (info) {
    {{ info }}
    } @else {
    <ng-template [ngTemplateOutlet]="infoTemplate"></ng-template>
    }
</ng-template>
