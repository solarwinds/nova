@if (showSpinner) {
<span
    class="nui-icon-busy-circular nui-spinner nui-spinner__container--{{
        size
    }}"
    [ngClass]="{ 'nui-spinner--determinate': isDeterminate }"
    [@spinnerAppear]
>
    <div class="nui-spinner__container">
        @if (!isDeterminate) {
        <svg
            class="nui-spinner__circular"
            viewBox="25 25 50 50"
            aria-hidden="true"
        >
            <circle
                class="nui-spinner__path-under"
                cx="50"
                cy="50"
                r="22"
                fill="none"
                stroke-width="5"
                stroke-miterlimit="10"
            />
            <circle
                class="nui-spinner__path"
                cx="50"
                cy="50"
                r="22"
                fill="none"
                stroke-width="5"
                stroke-miterlimit="10"
            />
        </svg>
        } @if (isDeterminate) {
        <svg
            class="nui-spinner__circular"
            viewBox="0 0 36 36"
            aria-hidden="true"
        >
            <circle
                class="nui-spinner__path-under"
                cx="18"
                cy="18"
                r="15.9155"
                fill="none"
                stroke-width="4"
                stroke-miterlimit="10"
            />
            <circle
                class="nui-spinner__path"
                cx="18"
                cy="18"
                r="15.9155"
                fill="none"
                stroke-width="4"
                stroke-miterlimit="10"
                [ngStyle]="{ 'stroke-dasharray': percent + ', 100' }"
            />
        </svg>
        } @if (allowCancel) {
        <button
            nui-button
            type="button"
            class="nui-spinner__cancel"
            icon="close"
            ariaLabel="Cancel"
            i18n-ariaLabel
            (click)="cancelProgress()"
            displayStyle="action"
            [nuiTooltip]="tooltipText"
        ></button>
        }
    </div>
    @if (showText) {
    <div class="nui-spinner__text-content">
        @if (message !== undefined) {
        <div class="nui-spinner__label">
            <span class="nui-text-label nui-spinner__label-item">{{
                message
            }}</span>
        </div>
        } @if (helpText !== undefined) {
        <span class="nui-spinner__hint nui-help-hint">
            {{ helpText }}
        </span>
        }
    </div>
    }
</span>
}
