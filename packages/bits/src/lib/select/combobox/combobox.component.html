<div class="nui-combobox__layout-block" [class.disabled]="isDisabled">
    <nui-popup
        [class.custom-template]="customTemplate"
        (opened)="openChange($event)"
        [manualOpenControl]="openControl"
        [width]="getWidth()"
        [contextClass]="getPopupContextClass()"
        [appendToBody]="appendToBody"
    >
        @if (!!icon) {
        <div class="nui-combobox__icon">
            <nui-icon
                [icon]="icon"
                aria-hidden="true"
                [iconColor]="getIconColor()"
            ></nui-icon>
        </div>
        }
        <div
            class="nui-combobox__container"
            [class.has-error]="isInErrorState"
            [class.nui-combobox__editable-container--disabled]="isDisabled"
            nuiPopupToggle
            [disabled]="isDisabled"
        >
            <nui-textbox
                class="nui-combobox__input"
                [class.nui-combobox__input-icon]="showIcon()"
                [class.nui-combobox__right-border]="showRightBorder()"
                [class.nui-combobox__input--with-remove-value]="
                    isRemoveValueDisplayed()
                "
                type="text"
                autocomplete="off"
                [value]="unescapeItem(inputValue)"
                [placeholder]="displayPlaceholderValue()"
                (textChange)="onInputChange($event)"
                [disabled]="isDisabled"
                [isInErrorState]="isInErrorState"
                [ariaLabel]="ariaLabel"
                #comboboxToggle
            >
            </nui-textbox>
            @if (isRemoveValueDisplayed()) {
            <button
                tabindex="-1"
                nui-button
                class="nui-combobox__remove-value"
                (click)="clearValue($event)"
                [isEmpty]="true"
                icon="remove"
                ariaLabel="Clear value"
                i18n-ariaLabel
                title="remove"
                displayStyle="action"
                type="button"
            ></button>
            }
            <button
                tabindex="-1"
                class="nui-combobox__toggle"
                nui-button
                [isEmpty]="true"
                icon="caret-down"
                ariaLabel="Toggle dropdown"
                i18n-ariaLabel
                title="toggle"
                displayStyle="action"
                type="button"
                [class.disabled]="isDisabled"
                [disabled]="isDisabled"
            ></button>
        </div>
        <div popupAreaContent>
            <div #scrollContainer class="nui-menu nui-combobox__menu">
                @for (item of itemsSource; track item) { @if (!item.items) {
                <nui-menu-action
                    tabindex="-1"
                    [class.item-selected]="isItemSelected(item)"
                    (actionDone)="select(item)"
                >
                    @if (!customTemplate) {
                    <span
                        tabindex="-1"
                        [innerHTML]="
                            getItemDisplay(item)
                                | nuiHighlight
                                    : (isItemSelected(item) ? '' : inputValue)
                        "
                    ></span>
                    }
                    <ng-container
                        [ngTemplateOutlet]="customTemplate"
                        [ngTemplateOutletContext]="{ context: item }"
                    >
                    </ng-container>
                </nui-menu-action>
                } @if (item.items) {
                <nui-menu-group tabindex="-1" [header]="item.header">
                    @for (groupedItem of item.items; track groupedItem) {
                    <nui-menu-action
                        [class.item-selected]="isItemSelected(groupedItem)"
                        (actionDone)="select(groupedItem)"
                    >
                        <span
                            tabindex="-1"
                            [innerHTML]="
                                getItemDisplay(groupedItem)
                                    | nuiHighlight
                                        : (isItemSelected(groupedItem)
                                              ? ''
                                              : inputValue)
                            "
                        ></span>
                    </nui-menu-action>
                    }
                </nui-menu-group>
                } }
            </div>
        </div>
    </nui-popup>
</div>
