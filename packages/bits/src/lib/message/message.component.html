<div
    [@dismiss]="dismissState"
    (@dismiss.done)="animationFinished($event)"
    (@dismiss.start)="animationStart($event)"
    class="nui-flex-container nui-flex--nowrap nui-message {{ messageClass }}"
    [ngClass]="{ 'nui-message-allow-dismiss': allowDismiss }"
    aria-live="polite"
    aria-atomic="true"
>
    <nui-icon class="nui-message-icon" [icon]="icon" [decorative]="true"></nui-icon>

    <div class="nui-message-content">
        <span class="nui-message-content-text">
            <ng-content></ng-content>
        </span>
    </div>

    @if (allowDismiss) {
    <div class="nui-message-dismiss-button">
        <button
            nui-button
            type="button"
            displayStyle="action"
            size="default"
            icon="close"
            ariaLabel="Dismiss message"
            i18n-ariaLabel
            (click)="dismissMessage()"
        ></button>
    </div>
    }
</div>
