<div class="btn-group" #toggleButton>
    <button
        nui-button
        type="button"
        role="checkbox"
        [ariaLabel]="ariaLabel"
        [attr.aria-checked]="checkboxChecked"
        class="nui-selector__checkbox-button"
        [displayStyle]="'default'"
        (click)="handleSelectorClick($event)"
        (keydown.space)="$event.preventDefault(); handleSelectorClick($event)"
    >
        <div class="nui-selector__checkbox-container" aria-hidden="true">
            <nui-checkbox
                #checkbox
                [checked]="checkboxChecked"
                [indeterminate]="indeterminate"
            >
            </nui-checkbox>
        </div>
    </button>
    @if (items?.length) {
    <button
        nui-button
        type="button"
        class="nui-selector__toggle"
        ariaLabel="Open Selector Menu"
        i18n-ariaLabel
        [displayStyle]="'default'"
        [icon]="'caret-down'"
        aria-haspopup="menu"
        [attr.aria-expanded]="overlay.showing"
        (click)="overlay.toggle()"
    ></button>
    }
</div>

<div #popupArea></div>

<nui-overlay
    #overlay
    [toggleReference]="toggleButton"
    [overlayConfig]="overlayConfig"
    [customContainer]="customContainer"
>
    <nui-menu-popup
        [itemsSource]="items"
        (menuItemClicked)="handleItemClick($event)"
    ></nui-menu-popup>
</nui-overlay>
