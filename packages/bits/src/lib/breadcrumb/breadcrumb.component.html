@if (items?.length > 1) {
<div role="navigation" [attr.aria-label]="ariaLabel" class="nui-breadcrumb">
    @for (item of items; track item; let isLast = $last) {
    <span class="nui-breadcrumb__wrapper">
        @if (!isLast) {
        <a
            [attr.href]="item?.url"
            class="nui-breadcrumb__crumb nui-breadcrumb__crumb__link"
            (click)="handleClick($event, item)"
            >{{ item.title }}</a
        >
        <nui-icon
            class="nui-breadcrumb__caret-icon"
            icon="caret-right"
            iconColor="disabled-gray"
            iconSize="small"
        ></nui-icon>
        } @if (isLast) {
        <span
            aria-current="page"
            class="nui-breadcrumb__crumb nui-breadcrumb__crumb-current-level"
            >{{ item.title }}</span
        >
        }
    </span>
    }
</div>
}
