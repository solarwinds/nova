@if (isBusy) {
<div [ngStyle]="getRippleContainerStyle()" class="nui-button-ripple-container">
    <div class="ripple ripple-1"></div>
    <div class="ripple ripple-2"></div>
</div>
} @if (icon) {
<nui-icon
    class="nui-button__icon"
    [icon]="icon"
    [iconSize]="getIconSize()"
    [iconColor]="iconColor"
    [decorative]="true"
></nui-icon>
}
<div #contentContainer class="nui-button__content">
    <ng-content></ng-content>
</div>
