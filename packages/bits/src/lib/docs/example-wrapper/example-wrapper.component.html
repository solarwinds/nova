<div class="nui-example-wrapper__container">
    <div class="nui-example-wrapper__header">
        <h4 class="nui-example-wrapper__title">{{ exampleTitle }}</h4>
        <div>
            <button
                nui-button
                type="button"
                displayStyle="action"
                icon="{{
                    showSource ? 'double-caret-up' : 'double-caret-down'
                }}"
                title="Show source"
                [nuiTooltip]="getTooltip()"
                tooltipPlacement="bottom"
                (click)="showSource = !showSource"
            ></button>
            <button
                nui-button
                type="button"
                displayStyle="action"
                icon="external-link"
                title="Open in CodeSandbox"
                nuiTooltip="Open in Code Sandbox (only self-contained examples are opened properly)"
                tooltipPlacement="bottom"
                (click)="openCodeSandboxExample()"
            ></button>
        </div>
    </div>
    @if (showSource) {
    <div class="nui-example-wrapper__source">
        <nui-tab-group>
            @if (!!getExampleComponents('html')) {
            <nui-tab heading="HTML">
                <div class="media-body">
                    <nui-copy-text
                        fileContent="{{ getExampleComponents('html') }}"
                    ></nui-copy-text>
                    <nui-example-code
                        language="html"
                        [code]="getExampleComponents('html')"
                    />
                </div>
            </nui-tab>
            } @if (!!getExampleComponents('ts')) {
            <nui-tab heading="Typescript">
                <nui-copy-text
                    fileContent="{{ getExampleComponents('ts') }}"
                ></nui-copy-text>
                <div class="media-body">
                    <nui-example-code
                        language="typescript"
                        [code]="getExampleComponents('ts')"
                    />
                </div>
            </nui-tab>
            } @if (!!getExampleComponents('less')) {
            <nui-tab heading="Less">
                <nui-copy-text
                    fileContent="{{ getExampleComponents('less') }}"
                ></nui-copy-text>
                <div class="media-body">
                    @if (!!getExampleComponents('less')) {
                    <nui-example-code [code]="getExampleComponents('less')" />
                    } @else {
                    <nui-image image="no-data-to-show"></nui-image>
                    }
                </div>
            </nui-tab>
            }
        </nui-tab-group>
    </div>
    }
    <div class="nui-example-wrapper__content">
        <ng-content></ng-content>
    </div>
</div>
