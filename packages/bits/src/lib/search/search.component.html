<div class="nui-search__group input-group" [class.has-error]="isInErrorState">
    <div class="nui-search__input">
        <div class="nui-search__button input-group-btn">
            <button
                nui-button
                type="button"
                *ngIf="!!value"
                class="nui-search__button-cancel"
                displayStyle="action"
                icon="close"
                ariaLabel="Cancel search"
                i18n-ariaLabel="@@search.cancelButton.ariaLabel|Cancel search button ARIA label"
                (click)="onCancel()"
            ></button>
            <button
                nui-button
                type="button"
                class="nui-search__button-search"
                displayStyle="action"
                icon="search"
                ariaLabel="Search"
                i18n-ariaLabel="@@search.searchButton.ariaLabel|Search button ARIA label"
                [disabled]="isButtonDisabled()"
                (click)="onSearch()"
            ></button>
        </div>
        <input
            class="nui-search__input-control form-control"
            type="text"
            [attr.name]="name"
            [nuiSetFocus]="captureFocus"
            (focusChange)="onFocusChange($event)"
            autocomplete="off"
            (input)="onInputChange()"
            [(ngModel)]="value"
            [placeholder]="getPlaceholder()"
            (keyup)="onKeyup($event)"
            aria-label="Search input"
            i18n-aria-label="@@search.input.ariaLabel|Search input ARIA label"
            [attr.aria-invalid]="isInErrorState"
        />
    </div>
</div>
