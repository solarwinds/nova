<div class="nui-tabgroup" [class.flex-column]="!vertical">
    <div
        class="nui-tabs__holder"
        [class.vertical]="vertical"
        (click)="$event.preventDefault()"
    >
        @if (hasTraverse) {
        <!-- a11y: WCAG 2.5.8 Target Size - TODO: NUI-6279 -->
        <div
            class="btn-caret-left"
            role="button"
            tabindex="0"
            aria-label="Scroll tabs left"
            i18n-aria-label
            [class.disabled]="!rightTraverseEnabled"
            [attr.aria-disabled]="!rightTraverseEnabled ? 'true' : null"
            (click)="traverseRight()"
            (keydown.enter)="traverseRight()"
            (keydown.space)="$event.preventDefault(); traverseRight()"
        >
            <nui-icon
                [icon]="'caret-left'"
                [iconColor]="!rightTraverseEnabled ? 'gray' : 'default'"
                [decorative]="true"
            ></nui-icon>
        </div>
        }
        <div class="nui-tabs">
            <div class="nui-tabs__container" [class.flex-column]="vertical">
                @for (tab of tabs; track tab) {
                <div
                    class="nui-tab"
                    [class.active]="tab.active && !vertical"
                    [class.horizontal]="tab.active && !vertical"
                    [class.disabled]="tab.disabled"
                    [class.active__vertical]="tab.active && vertical"
                >
                    <span class="tab-link" (click)="selectTab(tab)">
                        <span
                            [nuiTabHeadingCustomTemplateRef]="tab.headingRef"
                            >{{ tab.heading }}</span
                        >
                    </span>
                </div>
                }
            </div>
        </div>
        @if (hasTraverse) {
        <!-- a11y: WCAG 2.5.8 Target Size - TODO: NUI-6279 -->
        <div
            class="btn-caret-right"
            role="button"
            tabindex="0"
            aria-label="Scroll tabs right"
            i18n-aria-label
            [class.disabled]="!leftTraverseEnabled"
            [attr.aria-disabled]="!leftTraverseEnabled ? 'true' : null"
            (click)="traverseLeft()"
            (keydown.enter)="traverseLeft()"
            (keydown.space)="$event.preventDefault(); traverseLeft()"
        >
            <nui-icon
                [icon]="'caret-right'"
                [iconColor]="!leftTraverseEnabled ? 'gray' : 'default'"
                [decorative]="true"
            ></nui-icon>
        </div>
        }
    </div>
    <div class="nui-tabgroup__content">
        <ng-content></ng-content>
    </div>
</div>
