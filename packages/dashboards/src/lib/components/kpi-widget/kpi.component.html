<nui-kpi-tile-view
    [value]="widgetData?.value"
    [label]="widgetData?.label"
    [units]="widgetData?.units"
    [backgroundColor]="backgroundColor || widgetData?.backgroundColor"
    [textColor]="widgetData?.textColor"
    [link]="widgetData?.link"
    [interactive]="interactive"
    [loading]="busy"
    [empty]="showEmpty"
    [fontSize]="widgetData?.fontSize"
    [margin]="widgetData?.margin ?? 2"
    [syncValuesBroker]="syncValuesBroker"
    [valueTemplate]="configuration?.formatters?.Value ? formatterValueTpl : null"
    (tileClick)="onInteraction()"
></nui-kpi-tile-view>

<ng-template #formatterValueTpl>
    <ng-container
        nuiComponentPortal
        #componentPortal="nuiComponentPortal"
        componentId="KpiValueFormatter"
        [componentType]="configuration?.formatters?.Value?.formatter?.componentType"
        [properties]="formattersProperties?.Value"
    >
        <span [ngClass]="configuration?.formatters?.Value?.formatter?.componentType === 'IconFormatterComponent' ? 'without-filter' : ''">
            <ng-template
                [cdkPortalOutlet]="componentPortal.portal"
                (attached)="componentPortal.attached($event)"
            ></ng-template>
        </span>
    </ng-container>
</ng-template>
