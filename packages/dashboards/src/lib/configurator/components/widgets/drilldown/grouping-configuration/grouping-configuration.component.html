<nui-widget-editor-accordion
    [formGroup]="form"
    [state]="form | nuiWidgetEditorAccordionFormState | async"
>
    <nui-widget-editor-accordion-header
        [headerIcon]="'tag'"
        [subtitle]="getSubtitle()"
        headerTitle="Grouping"
    />
    <div
        class="grouping-configuration__accordion-content"
        formArrayName="groupBy"
    >
        @for (group of getGroupByControl.controls; track group; let i = $index)
        { @if (i !== 0) {
        <label class="d-flex nui-text-secondary mb-1" i18n>Then</label>
        } @if (i === 0) {
        <label class="d-flex nui-text-panel mb-2" i18n>Group by</label>
        }
        <div class="d-flex flex-row flex-grow-1 mb-4">
            <nui-form-field [control]="group" class="d-flex flex-grow-1">
                <nui-select-v2
                    placeholder="Select Item"
                    i18n-placeholder
                    [formControlName]="i"
                >
                    @for (item of selectData[i]; track item) {
                    <nui-select-v2-option [value]="item">
                        {{ item }}
                    </nui-select-v2-option>
                    }
                </nui-select-v2>
            </nui-form-field>
            <div class="justify-content-center">
                <button
                    nui-button
                    icon="delete"
                    displayStyle="action"
                    type="button"
                    aria-label="Remove grouping"
                    i18n-aria-label
                    (click)="removeRule(i)"
                ></button>
            </div>
        </div>
        } @if (!this.isAddRestricted()) {
        <button
            nui-button
            icon="add"
            displayStyle="action"
            type="button"
            i18n
            (click)="addGrouping()"
        >
            Add another level
        </button>
        }
    </div>
</nui-widget-editor-accordion>
