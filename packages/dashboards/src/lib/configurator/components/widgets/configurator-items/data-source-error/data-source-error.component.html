<div>
    @if (!dataSource) {
    <nui-message class="mt-4 d-block" type="info" [allowDismiss]="false">
        <b i18n>Select a data source</b>
    </nui-message>
    } @if (dataSourceError) {
    <nui-message class="mt-4 d-block" type="critical" [allowDismiss]="false">
        <b i18n>Something went wrong with the data source: </b>
        {{ dataSourceError.message || dataSourceError.type }}
    </nui-message>
    }
</div>
