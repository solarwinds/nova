@for (spark of chartAssist.sparks; track chartAssist.trackByFn($index, spark)) {
<div class="d-flex">
    <nui-chart
        class="w-100"
        [chart]="spark.chart"
        nuiChartCollectionId="example-collection-id"
    ></nui-chart>
    <div class="d-flex flex-column pl-2">
        @if (spark.chartSeriesSet[0]; as lineSeries) {
        <nui-legend-series
            [interactive]="false"
            [descriptionSecondary]="lineSeries.name"
        >
            <nui-rich-legend-tile
                [unitLabel]="lineSeries.units"
                [value]="chartAssist.getHighlightedValue(lineSeries, 'y')"
                [backgroundColor]="
                    statusBgColors.get(
                        chartAssist.getHighlightedValue(lineSeries, 'status')
                    )
                "
                [attr.data-title]="
                    chartAssist.getHighlightedValue(lineSeries, 'status')
                "
            >
                @if ( chartAssist.getHighlightedValue(lineSeries, 'status'); as
                status ) {
                <nui-icon
                    iconSize="small"
                    [icon]="statusIcons[status]"
                    leftEdge
                ></nui-icon>
                }
            </nui-rich-legend-tile>
        </nui-legend-series>
        }
    </div>
</div>
}
