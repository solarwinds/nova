@for (myChart of myCharts; track myChart; let i = $index) {
<div [style.min-height]="150">
    <div class="d-flex w-100 h-100">
        <nui-chart
            class="w-100"
            nuiChartCollectionId="1"
            [chart]="myChart.chart"
        ></nui-chart>
    </div>
    @if (myCharts.length - 1 > i) {
    <nui-divider></nui-divider>
    }
</div>
}
