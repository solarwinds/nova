<div class="nui-chart-range-slider" [style.padding-left.px]="trackOffset">
    <svg
        #track
        class="nui-chart-range-slider__surface"
        [attr.viewBox]="'0 0 ' + viewBoxWidth + ' ' + height"
        [style.height.px]="height"
        preserveAspectRatio="none"
        (mousedown)="onTrackMouseDown($event)"
    >
        <g class="nui-chart-range-slider__series">
            <ng-container *ngFor="let renderedSeries of previewSeries">
                <path
                    class="nui-chart-range-slider__area"
                    [attr.d]="renderedSeries.areaPath"
                    [attr.fill]="renderedSeries.color"
                ></path>
                <path
                    class="nui-chart-range-slider__line"
                    [attr.d]="renderedSeries.linePath"
                    [attr.stroke]="renderedSeries.color"
                ></path>
            </ng-container>
        </g>

        <ng-container *ngIf="selectionRect.width > 0">
            <rect
                class="nui-chart-range-slider__shade"
                x="0"
                y="0"
                [attr.width]="selectionRect.x"
                [attr.height]="height"
            ></rect>
            <rect
                class="nui-chart-range-slider__shade"
                [attr.x]="selectionRect.x + selectionRect.width"
                y="0"
                [attr.width]="
                    viewBoxWidth - selectionRect.x - selectionRect.width
                "
                [attr.height]="height"
            ></rect>

            <g
                class="nui-chart-range-slider__selection"
                [attr.transform]="'translate(' + selectionRect.x + ',0)'"
                (mousedown)="onSelectionMouseDown($event)"
            >
                <rect
                    class="nui-chart-range-slider__window"
                    x="0"
                    y="0"
                    [attr.width]="selectionRect.width"
                    [attr.height]="height"
                ></rect>
                <rect
                    class="nui-chart-range-slider__handle"
                    x="0"
                    y="0"
                    width="2"
                    [attr.height]="height"
                ></rect>
                <rect
                    class="nui-chart-range-slider__handle"
                    [attr.x]="selectionRect.width - 2"
                    y="0"
                    width="2"
                    [attr.height]="height"
                ></rect>
            </g>
        </ng-container>
    </svg>
</div>
