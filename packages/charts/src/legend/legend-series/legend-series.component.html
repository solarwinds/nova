<div
    class="d-flex"
    [ngClass]="['nui-legend-series--state-' + seriesRenderState]"
    [class.nui-legend-series--deselected]="!isSelected"
>
    <div class="nui-legend-series__tile-wrapper">
        <div class="nui-legend-series__tile">
            <ng-content></ng-content>
        </div>
        <div
            class="nui-legend-series__checkbox-wrapper"
            aria-hidden="true"
            [class.nui-legend-series__checkbox--checked]="isSelected"
        >
            <div class="nui-legend-series__checkbox-mark">
                <i class="nui-legend-series__checkbox-glyph"></i>
            </div>
        </div>
    </div>
    @if (hasInputDescription()) {
    <div
        class="description-container nui-text-small d-flex flex-column justify-content-center"
    >
        @if (!!descriptionPrimary) {
        <div
            class="description description-primary"
            [title]="descriptionPrimary"
        >
            {{ descriptionPrimary }}
        </div>
        } @if (!!descriptionSecondary) {
        <div
            class="description description-secondary"
            [title]="descriptionSecondary"
        >
            {{ descriptionSecondary }}
        </div>
        }
    </div>
    } @else {
    <div class="d-flex" #projectedDescription>
        <ng-content select="[description]"></ng-content>
    </div>
    }
    <div class="legend-menu">
        <ng-content select="[legendMenu]"></ng-content>
    </div>
</div>
